<title>ReelsVault</title>

<!-- PWA Manifest inline via JS -->
<script>
  const manifest = {
    name: "ReelsVault",
    short_name: "ReelsVault",
    description: "Save your favourite reels in one place",
    start_url: ".",
    display: "standalone",
    background_color: "#0a0a0f",
    theme_color: "#0a0a0f",
    icons: [
      { src: "https://via.placeholder.com/192x192/8b5cf6/ffffff?text=RV", sizes: "192x192", type: "image/png" },
      { src: "https://via.placeholder.com/512x512/8b5cf6/ffffff?text=RV", sizes: "512x512", type: "image/png" }
    ],
    share_target: {
      action: ".",
      method: "GET",
      params: { url: "shared_url", title: "shared_title", text: "shared_text" }
    }
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
  const mlink = document.createElement("link");
  mlink.rel = "manifest";
  mlink.href = URL.createObjectURL(blob);
  document.head.appendChild(mlink);
</script>
