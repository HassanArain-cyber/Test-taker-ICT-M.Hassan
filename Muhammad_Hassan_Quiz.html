function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

const CHAPTERS = ["All", "1A", "1B", "2A", "2B"];
const CH_LABELS = { All: "All", "1A": "Ch 1A", "1B": "Ch 1B", "2A": "Ch 2A", "2B": "Ch 2B" };

function Quiz() {
  const [screen, setScreen] = useState("home");
  const [filter, setFilter] = useState("All");
  const [pool, setPool] = useState([]);
  const [cur, setCur] = useState(0);
  const [sel, setSel] = useState(null);
  const [confirmed, setConfirmed] = useState(false);
  const [score, setScore] = useState(0);
  const [log, setLog] = useState([]);
  const [showReview, setShowReview] = useState(false);
  const [revFilter, setRevFilter] = useState("all");

  function start() {
    let qs = filter === "All" ? ALL_QUESTIONS : ALL_QUESTIONS.filter(q => q.ch === filter);
    qs = shuffle(qs).map(q => ({ ...q, shuffled: shuffle(q.opts.map((o, i) => ({ t: o, i }))) }));
    setPool(qs); setCur(0); setSel(null); setConfirmed(false);
    setScore(0); setLog([]); setShowReview(false); setScreen("quiz");
  }

  function confirm() {
    if (sel === null) return;
    const q = pool[cur];
    const ok = q.shuffled[sel].i === q.a;
    if (ok) setScore(s => s + 1);
    setLog(l => [...l, { q: q.q, ch: q.ch, topic: q.topic, ok, chosen: q.shuffled[sel].t, correct: q.opts[q.a] }]);
    setConfirmed(true);
  }

  function next() {
    if (cur + 1 >= pool.length) { setScreen("results"); return; }
    setCur(c => c + 1); setSel(null); setConfirmed(false);
  }

  const q = pool[cur];
  const total = pool.length;
  const pct = total > 0 ? Math.round((score / total) * 100) : 0;
  const gc = pct >= 90 ? "#22c55e" : pct >= 75 ? "#60a5fa" : pct >= 60 ? "#fbbf24" : "#f87171";
  const grade = pct >= 90 ? "Excellent 🏆" : pct >= 75 ? "Great Job 👍" : pct >= 60 ? "Passing ✅" : "Needs Work 📚";

  const count = (f) => f === "All" ? ALL_QUESTIONS.length : ALL_QUESTIONS.filter(q => q.ch === f).length;
  const reviewLog = revFilter === "wrong" ? log.filter(r => !r.ok) : revFilter === "correct" ? log.filter(r => r.ok) : log;

  const s = {
    page: { minHeight: "100vh", background: "#0a0a14", fontFamily: "'Segoe UI',sans-serif", color: "#e2e8f0", padding: "16px 12px" },
    card: { background: "rgba(255,255,255,0.04)", borderRadius: 20, padding: 26, border: "1px solid rgba(124,58,237,0.22)" },
    btn: (active) => ({ padding: "10px 6px", borderRadius: 12, border: active ? "2px solid #a78bfa" : "2px solid rgba(255,255,255,0.07)", background: active ? "rgba(167,139,250,0.18)" : "rgba(255,255,255,0.03)", color: active ? "#c084fc" : "#64748b", cursor: "pointer", fontWeight: 700, fontSize: 12, transition: "all .18s", width: "100%" }),
    startBtn: { width: "100%", padding: "15px", borderRadius: 14, background: "linear-gradient(135deg,#7c3aed,#4f46e5)", color: "#fff", border: "none", fontSize: 16, fontWeight: 800, cursor: "pointer", boxShadow: "0 0 40px rgba(124,58,237,0.3)", marginTop: 6 },
    optBtn: (state) => {
      const colors = { default: ["rgba(255,255,255,0.04)","rgba(255,255,255,0.08)","#94a3b8"], selected: ["rgba(124,58,237,0.2)","#a78bfa","#e9d5ff"], correct: ["rgba(34,197,94,0.12)","#22c55e","#86efac"], wrong: ["rgba(248,113,113,0.12)","#f87171","#fca5a5"] };
      const [bg, border, col] = colors[state] || colors.default;
      return { textAlign: "left", padding: "12px 15px", borderRadius: 12, background: bg, border: `1px solid ${border}`, color: col, cursor: state === "default" || state === "selected" ? "pointer" : "default", fontSize: 14, transition: "all .15s", fontFamily: "inherit", display: "flex", justifyContent: "space-between", alignItems: "center", width: "100%", boxSizing: "border-box" };
    }
  };

  return (
    <div style={s.page}>
      <div style={{ maxWidth: 680, margin: "0 auto" }}>
        {/* Header */}
        <div style={{ textAlign: "center", marginBottom: 18 }}>
          <div style={{ fontSize: 10, letterSpacing: 5, color: "#7c3aed", textTransform: "uppercase", marginBottom: 3 }}>Muhammad Hassan · Exam Prep</div>
          <h1 style={{ fontSize: 22, fontWeight: 900, margin: "0 0 3px", background: "linear-gradient(90deg,#a78bfa,#60a5fa)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Introduction to Computers</h1>
          <div style={{ fontSize: 12, color: "#374151" }}>{ALL_QUESTIONS.length} Questions · Chapters 1A · 1B · 2A · 2B</div>
        </div>

        {/* HOME */}
        {screen === "home" && (
          <div style={s.card}>
            <div style={{ fontSize: 13, color: "#64748b", textAlign: "center", marginBottom: 16 }}>Select a chapter to practice, or do all at once:</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 7, marginBottom: 22 }}>
              {CHAPTERS.map(c => (
                <button key={c} onClick={() => setFilter(c)} style={s.btn(filter === c)}>
                  {CH_LABELS[c]}
                  <div style={{ fontSize: 10, fontWeight: 400, marginTop: 2, color: filter === c ? "#a78bfa" : "#374151" }}>{count(c)}Q</div>
                </button>
              ))}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 20 }}>
              {[
                { ch: "1A", t: "Ch 1A — Intro to Computers", d: "Types, classification, society" },
                { ch: "1B", t: "Ch 1B — Inside the Computer", d: "Hardware, memory, software, I/O" },
                { ch: "2A", t: "Ch 2A — Internet & WWW", d: "History, access, HTML, searching" },
                { ch: "2B", t: "Ch 2B — Email & Services", d: "Email, IRC, FTP, IM, P2P" },
              ].map(x => (
                <div key={x.ch} onClick={() => { setFilter(x.ch); }} style={{ background: "rgba(255,255,255,0.03)", borderRadius: 12, padding: "11px 13px", border: `1px solid ${filter === x.ch ? "rgba(124,58,237,0.4)" : "rgba(255,255,255,0.06)"}`, cursor: "pointer" }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#a78bfa", marginBottom: 2 }}>{x.t}</div>
                  <div style={{ fontSize: 11, color: "#374151" }}>{x.d}</div>
                  <div style={{ fontSize: 11, color: "#6d28d9", marginTop: 3 }}>{count(x.ch)} questions</div>
                </div>
              ))}
            </div>
            <button onClick={start} style={s.startBtn}>🚀 Start — {count(filter)} Questions</button>
          </div>
        )}

        {/* QUIZ */}
        {screen === "quiz" && q && (
          <div style={s.card}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <span style={{ fontSize: 11, background: "rgba(124,58,237,0.2)", color: "#a78bfa", borderRadius: 20, padding: "3px 11px", fontWeight: 700 }}>Ch {q.ch} · {q.topic}</span>
              <span style={{ fontSize: 12, color: "#374151" }}>{cur + 1} / {total}</span>
            </div>
            <div style={{ height: 3, background: "rgba(255,255,255,0.06)", borderRadius: 3, marginBottom: 14 }}>
              <div style={{ height: "100%", width: `${((cur + 1) / total) * 100}%`, background: "linear-gradient(90deg,#7c3aed,#4f46e5)", borderRadius: 3, transition: "width .3s" }} />
            </div>
            <div style={{ display: "flex", gap: 14, marginBottom: 16, fontSize: 11 }}>
              <span style={{ color: "#22c55e" }}>✓ {score} correct</span>
              <span style={{ color: "#f87171" }}>✗ {cur - score} wrong</span>
            </div>
            <div style={{ fontSize: 16, fontWeight: 700, lineHeight: 1.6, marginBottom: 18, color: "#f1f5f9" }}>Q{cur + 1}. {q.q}</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 9, marginBottom: 18 }}>
              {q.shuffled.map((opt, i) => {
                const isRight = opt.i === q.a;
                let state = "default";
                if (i === sel && !confirmed) state = "selected";
                if (confirmed && isRight) state = "correct";
                if (confirmed && i === sel && !isRight) state = "wrong";
                return (
                  <button key={i} onClick={() => !confirmed && setSel(i)} style={s.optBtn(state)}>
                    <span><span style={{ fontWeight: 800, color: "#7c3aed", marginRight: 9 }}>{String.fromCharCode(65 + i)}.</span>{opt.t}</span>
                    {confirmed && isRight && <span>✓</span>}
                    {confirmed && i === sel && !isRight && <span>✗</span>}
                  </button>
                );
              })}
            </div>
            {!confirmed ? (
              <button onClick={confirm} disabled={sel === null} style={{ ...s.startBtn, background: sel !== null ? "linear-gradient(135deg,#7c3aed,#4f46e5)" : "rgba(255,255,255,0.04)", color: sel !== null ? "#fff" : "#374151", boxShadow: "none", marginTop: 0 }}>Confirm Answer</button>
            ) : (
              <div>
                <div style={{ padding: "11px 14px", borderRadius: 10, marginBottom: 11, fontSize: 13, background: q.shuffled[sel].i === q.a ? "rgba(34,197,94,0.08)" : "rgba(248,113,113,0.08)", color: q.shuffled[sel].i === q.a ? "#86efac" : "#fca5a5", border: `1px solid ${q.shuffled[sel].i === q.a ? "rgba(34,197,94,0.25)" : "rgba(248,113,113,0.25)"}` }}>
                  {q.shuffled[sel].i === q.a ? "✅ Correct!" : `❌ Wrong. Correct: ${q.opts[q.a]}`}
                </div>
                <button onClick={next} style={{ ...s.startBtn, marginTop: 0 }}>{cur + 1 >= total ? "See Results →" : "Next →"}</button>
              </div>
            )}
          </div>
        )}

        {/* RESULTS */}
        {screen === "results" && (
          <div>
            <div style={{ ...s.card, textAlign: "center", marginBottom: 14 }}>
              <div style={{ fontSize: 56, fontWeight: 900, color: gc, lineHeight: 1 }}>{pct}%</div>
              <div style={{ fontSize: 18, fontWeight: 700, color: gc, margin: "6px 0 4px" }}>{grade}</div>
              <div style={{ fontSize: 14, color: "#4b5563" }}><span style={{ color: "#22c55e", fontWeight: 700 }}>{score}</span> correct · <span style={{ color: "#f87171", fontWeight: 700 }}>{total - score}</span> wrong · {total} total</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 7, margin: "18px 0 20px" }}>
                {["1A","1B","2A","2B"].map(ch => {
                  const cl = log.filter(r => r.ch === ch);
                  if (!cl.length) return null;
                  const cs = cl.filter(r => r.ok).length;
                  const cp = Math.round((cs / cl.length) * 100);
                  return (
                    <div key={ch} style={{ background: "rgba(255,255,255,0.03)", borderRadius: 11, padding: "9px 13px", border: "1px solid rgba(255,255,255,0.05)", textAlign: "left" }}>
                      <div style={{ fontSize: 11, color: "#7c3aed", fontWeight: 700, marginBottom: 2 }}>Chapter {ch}</div>
                      <div style={{ fontSize: 20, fontWeight: 800, color: cp >= 70 ? "#22c55e" : "#f87171" }}>{cp}%</div>
                      <div style={{ fontSize: 11, color: "#374151" }}>{cs}/{cl.length}</div>
                    </div>
                  );
                })}
              </div>
              <div style={{ display: "flex", gap: 9, justifyContent: "center", flexWrap: "wrap" }}>
                <button onClick={() => setShowReview(!showReview)} style={{ padding: "9px 20px", borderRadius: 50, background: "rgba(124,58,237,0.12)", border: "1px solid #7c3aed", color: "#a78bfa", cursor: "pointer", fontWeight: 600, fontSize: 12 }}>
                  {showReview ? "Hide Review" : "📋 Review Answers"}
                </button>
                <button onClick={() => setScreen("home")} style={{ padding: "9px 20px", borderRadius: 50, background: "linear-gradient(135deg,#7c3aed,#4f46e5)", border: "none", color: "#fff", cursor: "pointer", fontWeight: 600, fontSize: 12 }}>
                  🔁 Try Again
                </button>
              </div>
            </div>
            {showReview && (
              <div>
                <div style={{ display: "flex", gap: 7, marginBottom: 12 }}>
                  {[["all","All"],["wrong","Wrong Only"],["correct","Correct Only"]].map(([v,l]) => (
                    <button key={v} onClick={() => setRevFilter(v)} style={{ padding: "6px 14px", borderRadius: 50, fontSize: 11, fontWeight: 600, cursor: "pointer", border: revFilter === v ? "1px solid #a78bfa" : "1px solid rgba(255,255,255,0.07)", background: revFilter === v ? "rgba(167,139,250,0.12)" : "transparent", color: revFilter === v ? "#c084fc" : "#374151" }}>{l}</button>
                  ))}
                  <span style={{ fontSize: 11, color: "#374151", marginLeft: "auto", alignSelf: "center" }}>{reviewLog.length} shown</span>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
                  {reviewLog.map((r, i) => (
                    <div key={i} style={{ background: r.ok ? "rgba(34,197,94,0.05)" : "rgba(248,113,113,0.05)", borderRadius: 13, padding: "13px 15px", border: `1px solid ${r.ok ? "rgba(34,197,94,0.18)" : "rgba(248,113,113,0.18)"}` }}>
                      <div style={{ fontSize: 10, color: "#374151", marginBottom: 3 }}>Ch {r.ch} · {r.topic}</div>
                      <div style={{ fontSize: 13, fontWeight: 600, color: "#e2e8f0", marginBottom: 7 }}>{r.q}</div>
                      <div style={{ fontSize: 12, color: r.ok ? "#86efac" : "#fca5a5" }}>{r.ok ? "✅" : "❌"} {r.chosen}</div>
                      {!r.ok && <div style={{ fontSize: 12, color: "#86efac", marginTop: 3 }}>✓ {r.correct}</div>}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Quiz />);
  </script>
